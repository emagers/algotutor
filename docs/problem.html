<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problem — AlgoTutor</title>
  <link rel="stylesheet" href="app/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">AlgoTutor</a>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="problems.html" class="active">Problems</a>
      <a href="lessons.html">Lessons</a>
    </nav>
  </header>

  <main class="container wide">
    <div class="problem-layout" id="problem-layout">
      <section class="problem-pane" id="problem-pane">
        <div class="pane-header" id="problem-head">
          <h2>Loading…</h2>
        </div>
        <div class="problem-tabs">
          <button class="problem-tab active" data-tab="description">Description</button>
          <button class="problem-tab" data-tab="video">Video</button>
        </div>
        <div class="pane-body" id="problem-body">
          <div class="loading">Loading problem…</div>
        </div>
        <div class="pane-body hidden" id="video-body"></div>
      </section>

      <div class="resize-handle" id="resize-handle" title="Drag to resize"></div>

      <section class="editor-pane">
        <div class="pane-header">
          <div class="lang-tabs">
            <button class="lang-tab active" data-lang="javascript">JavaScript</button>
            <button class="lang-tab" data-lang="rust">Rust</button>
            <button class="lang-tab" data-lang="go">Go</button>
          </div>
          <span class="lang-warning" id="lang-warning"></span>
        </div>
        <div class="editor-container" id="editor"></div>

        <div class="run-area" id="run-area">
          <div class="section-header" data-toggle="run-area">
            <span class="chev">▼</span>
            <span>Custom input (JSON object keyed by parameter name)</span>
          </div>
          <div class="section-body">
            <textarea id="custom-input" spellcheck="false"></textarea>
          </div>
        </div>

        <div class="run-controls">
          <button id="btn-run">▶ Run with custom input</button>
          <div class="spacer"></div>
          <button id="btn-submit" class="primary">Submit (run all tests)</button>
        </div>

        <div class="output-area hidden" id="output">
          <div class="section-header" data-toggle="output">
            <span class="chev">▼</span>
            <span>Output</span>
          </div>
          <div class="section-body" id="output-body"></div>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="app/pages/problem.js"></script>
</body>
</html>
